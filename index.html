<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Browser CLI</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background-color: #212529; /* Dark background */
            color: #28a745; /* Green text for CLI feel */
            font-family: 'Inter', monospace; /* Monospace font for CLI feel, with Inter as fallback */
        }
        .cli-container {
            max-width: 768px; /* Max width similar to the React version */
            margin-top: 2rem;
        }
        .cli-input-group {
            background-color: #343a40; /* Darker gray for input area */
            border: 1px solid #495057; /* Border for input card */
            border-radius: 0.5rem;
            padding: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.2);
        }
        .cli-results-card {
            background-color: #343a40; /* Darker gray for results area */
            border: 1px solid #495057; /* Border for results card */
            border-radius: 0.5rem;
            padding: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.2);
        }
        .form-control-cli {
            background-color: transparent;
            border: none;
            border-bottom: 1px solid #6c757d; /* Gray border bottom */
            color: white;
            padding: 0.25rem 0.5rem;
            outline: none;
            box-shadow: none;
            transition: border-color 0.15s ease-in-out;
        }
        .form-control-cli:focus {
            border-color: #007bff; /* Blue on focus */
            box-shadow: none;
        }
        .repo-item {
            border-bottom: 1px solid #495057; /* Separator for repo items */
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .repo-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .repo-link {
            color: #007bff; /* Blue link color */
            text-decoration: none;
        }
        .repo-link:hover {
            text-decoration: underline;
        }
        .text-info-custom {
            color: #6c757d; /* Lighter gray for descriptions */
        }
        .text-yellow-custom {
            color: #ffc107; /* Yellow for stars */
        }
        .text-purple-custom {
            color: #6f42c1; /* Purple for forks */
        }
        /* Custom gradient for the header text */
        .gradient-text {
            background: linear-gradient(to right, #007bff, #6f42c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent; /* Fallback for browsers that don't support text fill color */
        }
    </style>
</head>
<body class="d-flex flex-column align-items-center min-vh-100 p-4">

    <h1 class="text-white fw-bold mb-4 rounded-3 p-2 shadow-lg">
        <span class="gradient-text">GitHub Browser CLI</span>
    </h1>

    <div class="container cli-container">
        <!-- CLI Input Area -->
        <div class="cli-input-group mb-4">
            <div class="d-flex align-items-center mb-3">
                <span class="text-info me-2">user@github-cli:~$</span>
                <input
                    type="text"
                    id="searchQuery"
                    placeholder="search <repository_name>"
                    class="form-control-cli flex-grow-1"
                >
            </div>
            <p id="loadingMessage" class="text-warning d-none">Loading...</p>
            <p id="errorMessage" class="text-danger d-none"></p>
        </div>

        <!-- Results Display Area -->
        <div class="cli-results-card" id="resultsContainer">
            <p class="text-secondary" id="initialMessage">Type "search &lt;repository_name&gt;" to begin.</p>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcgaILQ/hQJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIH" crossorigin="anonymous"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchQueryInput = document.getElementById('searchQuery');
            const resultsContainer = document.getElementById('resultsContainer');
            const loadingMessage = document.getElementById('loadingMessage');
            const errorMessage = document.getElementById('errorMessage');
            const initialMessage = document.getElementById('initialMessage');

            let searchTimeout;
            let currentQuery = '';

            /**
             * Debounces the search input to limit API calls.
             * @param {Function} func The function to debounce.
             * @param {number} delay The delay in milliseconds.
             */
            const debounce = (func, delay) => {
                return function(...args) {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => func.apply(this, args), delay);
                };
            };

            /**
             * Fetches GitHub repositories based on the provided search term.
             * Implements exponential backoff for API call retries.
             * @param {string} searchTerm The term to search for on GitHub.
             */
            const searchGitHubRepositories = async (searchTerm) => {
                loadingMessage.classList.remove('d-none');
                errorMessage.classList.add('d-none');
                initialMessage.classList.add('d-none');
                resultsContainer.innerHTML = ''; // Clear previous results

                let retries = 0;
                const maxRetries = 5;
                const baseDelay = 1000; // 1 second

                while (retries < maxRetries) {
                    try {
                        const apiUrl = `https://api.github.com/search/repositories?q=${encodeURIComponent(searchTerm)}&per_page=10`;
                        const response = await fetch(apiUrl);

                        if (response.status === 403 && response.headers.get('X-RateLimit-Remaining') === '0') {
                            const resetTime = parseInt(response.headers.get('X-RateLimit-Reset')) * 1000;
                            const delay = Math.max(resetTime - Date.now(), baseDelay * Math.pow(2, retries));
                            console.warn(`Rate limit exceeded. Retrying in ${delay / 1000} seconds.`);
                            await new Promise(res => setTimeout(res, delay));
                            retries++;
                            continue;
                        }

                        if (!response.ok) {
                            throw new Error(`GitHub API error: ${response.status} ${response.statusText}`);
                        }

                        const data = await response.json();
                        displayResults(data.items);
                        break; // Exit loop on success
                    } catch (err) {
                        errorMessage.textContent = `Error: Failed to fetch repositories: ${err.message}`;
                        errorMessage.classList.remove('d-none');
                        console.error('API call error:', err);
                        retries++;
                        const delay = baseDelay * Math.pow(2, retries);
                        console.warn(`Retrying in ${delay / 1000} seconds... (Attempt ${retries}/${maxRetries})`);
                        await new Promise(res => setTimeout(res, delay));
                    } finally {
                        loadingMessage.classList.add('d-none');
                    }
                }

                if (retries === maxRetries) {
                    errorMessage.textContent = 'Error: Max retries reached. Please try again later.';
                    errorMessage.classList.remove('d-none');
                }
            };

            /**
             * Displays the fetched repository results in the UI.
             * @param {Array} repos An array of repository objects.
             */
            const displayResults = (repos) => {
                resultsContainer.innerHTML = ''; // Clear existing results
                if (repos.length === 0) {
                    resultsContainer.innerHTML = `<p class="text-secondary">No repositories found for "${currentQuery}".</p>`;
                    return;
                }

                repos.forEach(repo => {
                    const repoDiv = document.createElement('div');
                    repoDiv.classList.add('repo-item');

                    repoDiv.innerHTML = `
                        <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer" class="repo-link d-block fs-5 fw-bold mb-1">
                            ${repo.full_name}
                        </a>
                        <p class="text-info-custom mb-2">${repo.description || 'No description provided.'}</p>
                        <div class="d-flex align-items-center small">
                            <span class="me-4 d-flex align-items-center">
                                <i class="fas fa-star text-warning me-1 text-yellow-custom"></i>
                                Stars: ${repo.stargazers_count.toLocaleString()}
                            </span>
                            <span class="d-flex align-items-center">
                                <i class="fas fa-code-branch text-purple-custom me-1"></i>
                                Forks: ${repo.forks_count.toLocaleString()}
                            </span>
                        </div>
                    `;
                    resultsContainer.appendChild(repoDiv);
                });
            };

            // Event listener for input changes, debounced
            searchQueryInput.addEventListener('input', debounce((event) => {
                currentQuery = event.target.value.trim();
                if (currentQuery) {
                    searchGitHubRepositories(currentQuery);
                } else {
                    resultsContainer.innerHTML = '';
                    initialMessage.classList.remove('d-none');
                    loadingMessage.classList.add('d-none');
                    errorMessage.classList.add('d-none');
                }
            }, 500)); // 500ms debounce delay
        });
    </script>
</body>
</html>
